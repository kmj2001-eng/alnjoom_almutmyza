<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1200px;
            height: 630px;
            overflow: hidden;
            font-family: 'Cairo', sans-serif;
            direction: rtl;
        }
        .og-card {
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #1e40af 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #fff;
            position: relative;
            overflow: hidden;
            padding: 50px 80px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        .logo-area img {
            width: 70px;
            height: 70px;
            object-fit: contain;
        }
        .logo-text {
            text-align: right;
        }
        .logo-title {
            font-size: 28px;
            font-weight: 900;
            color: #fff;
            line-height: 1.3;
        }
        .logo-subtitle {
            font-size: 16px;
            color: #fbbf24;
            font-weight: 700;
        }
        h1 {
            font-size: 48px;
            font-weight: 900;
            line-height: 1.4;
            margin-bottom: 12px;
        }
        h1 span {
            color: #fbbf24;
        }
        .desc {
            font-size: 20px;
            color: rgba(255,255,255,0.85);
            margin-bottom: 28px;
        }
        .phone-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
        }
        .phone-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #dc2626;
            padding: 14px 36px;
            border-radius: 12px;
            font-size: 26px;
            font-weight: 800;
        }
        .whatsapp-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #25d366;
            padding: 14px 36px;
            border-radius: 12px;
            font-size: 26px;
            font-weight: 800;
        }
        .location {
            margin-top: 20px;
            font-size: 16px;
            color: rgba(255,255,255,0.6);
        }
    </style>
</head>
<body>
    <div class="og-card">
        <div class="logo-area">
            <div class="logo-text">
                <div class="logo-title">مؤسسة النجوم المتميزة</div>
                <div class="logo-subtitle">لصيانة وغسيل المكيفات</div>
            </div>
            <img src="images/logo.png" alt="logo">
        </div>

        <h1>صيانة وغسيل مكيفات في <span>المدينة المنورة</span></h1>
        <p class="desc">فني تكييف معتمد – صيانة، غسيل، تركيب، تعبئة فريون – العزيزية وجميع الأحياء</p>

        <div class="phone-bar">
            <div class="phone-btn"><i class="fas fa-phone-alt"></i> 0590917476</div>
            <div class="whatsapp-btn"><i class="fab fa-whatsapp"></i> واتساب</div>
        </div>

        <div class="location"><i class="fas fa-map-marker-alt"></i> المدينة المنورة – العزيزية</div>
    </div>
</body>
</html>
