<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" width="400" height="480">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e56a0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#163d7c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e41e2b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c41922;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Blue swoosh curve (back part - behind star) -->
  <path d="M 280 40
           C 320 60, 350 120, 340 180
           C 330 230, 290 260, 260 290
           C 230 320, 210 360, 200 400
           C 190 430, 170 460, 140 475
           C 110 480, 85 465, 75 440
           C 60 400, 90 360, 120 330"
        fill="none" stroke="url(#blueGrad)" stroke-width="38" stroke-linecap="round"/>

  <!-- Red star -->
  <polygon points="200,45 230,145 335,145 250,210 280,310 200,250 120,310 150,210 65,145 170,145"
           fill="url(#redGrad)"/>

  <!-- White star cutout (inner) for depth -->
  <polygon points="200,85 218,150 290,150 232,195 252,265 200,225 148,265 168,195 110,150 182,150"
           fill="white"/>

  <!-- Blue swoosh curve (front part - in front of star) -->
  <path d="M 120 330
           C 140 310, 165 295, 185 310
           C 210 330, 200 370, 185 400
           C 170 430, 145 455, 115 465"
        fill="none" stroke="url(#blueGrad)" stroke-width="32" stroke-linecap="round"/>

  <!-- Red line accent (bottom left) -->
  <path d="M 85 145
           C 60 200, 50 270, 65 340
           C 70 360, 80 370, 90 365"
        fill="none" stroke="url(#redGrad)" stroke-width="12" stroke-linecap="round"/>
</svg>
